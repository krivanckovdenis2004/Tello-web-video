<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Tello WebRTC</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="app">
    <section id="home" class="card">
      <div class="brand">TELLO</div>
      <p class="sub">Своя видеосвязь без Jitsi</p>
      <button id="createBtn" class="primary">Создать звонок</button>
      <div class="line"><span>или</span></div>
      <input id="roomInput" placeholder="Код комнаты: TELLO-123456" />
      <button id="joinBtn" class="secondary">Войти</button>
      <p class="hint">Отправь код или ссылку другу. Оба должны разрешить камеру и микрофон.</p>
    </section>

    <section id="call" class="call hidden">
      <header class="topbar">
        <div>
          <h1 id="roomTitle">TELLO</h1>
          <p id="status">Подготовка...</p>
        </div>
        <button id="copyBtn" class="small">Ссылка</button>
      </header>

      <div class="videos">
        <video id="remoteVideo" autoplay playsinline></video>
        <video id="localVideo" autoplay playsinline muted></video>
      </div>

      <div id="waitBox" class="wait">
        <b>Ждём друга</b>
        <span>Отправь ссылку. Когда друг войдёт, видео появится автоматически.</span>
      </div>

      <footer class="controls">
        <button id="micBtn">Микрофон</button>
        <button id="camBtn">Камера</button>
        <button id="flipBtn">Сменить</button>
        <button id="hangupBtn" class="danger">Выйти</button>
      </footer>
    </section>
  </main>

  <script type="module" src="script.js"></script>
</body>
</html>
