<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tello Video</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="app">
    <section id="home" class="card">
      <div class="brand">TELLO</div>
      <p class="sub">Простой видеозвонок по ссылке</p>

      <button id="createBtn" class="btn primary">Создать звонок</button>

      <div class="divider"><span>или</span></div>

      <label class="label">Код комнаты</label>
      <input id="roomInput" class="input" placeholder="TELLO-123456" autocomplete="off" />
      <button id="joinByCodeBtn" class="btn secondary">Войти по коду</button>
    </section>

    <section id="room" class="card room hidden">
      <div class="roomTop">
        <div>
          <div class="small">Комната</div>
          <h1 id="roomCode">TELLO-000000</h1>
        </div>
        <button id="backBtn" class="exit">Назад</button>
      </div>

      <div class="steps">
        <div class="step"><b>1</b><span>Скопируй ссылку и отправь другу</span></div>
        <div class="step"><b>2</b><span>Оба нажмите «Открыть звонок»</span></div>
        <div class="step"><b>3</b><span>Разрешите камеру и микрофон</span></div>
      </div>

      <button id="copyBtn" class="btn primary">Скопировать ссылку</button>
      <button id="shareBtn" class="btn secondary">Поделиться</button>
      <button id="openCallBtn" class="btn call">Открыть звонок</button>

      <p class="hint">Важно: друг должен открыть эту же ссылку и тоже нажать «Открыть звонок».</p>
    </section>
  </main>

  <div id="toast" class="toast hidden">Ссылка скопирована</div>

  <script src="script.js"></script>
</body>
</html>
